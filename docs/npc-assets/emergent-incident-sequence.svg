    <rect x="635" y="365" width="130" height="76" rx="5" fill="#fff7ed" stroke="#fed7aa"/><text x="700" y="386" text-anchor="middle" class="h">Utility 评分</text><text x="700" y="407" text-anchor="middle">救火 0.82</text><text x="700" y="426" text-anchor="middle">逃生 0.61</text>
