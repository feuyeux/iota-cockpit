  <g stroke="#9ca3af" stroke-dasharray="5,4"><line x1="115" y1="114" x2="115" y2="710"/><line x1="310" y1="114" x2="310" y2="710"/><line x1="505" y1="114" x2="505" y2="710"/><line x1="700" y1="114" x2="700" y2="710"/><line x1="895" y1="114" x2="895" y2="710"/><line x1="1090" y1="114" x2="1090" y2="710"/></g>
  <g font-size="12" class="t">
