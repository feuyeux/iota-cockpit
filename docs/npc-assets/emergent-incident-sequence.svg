    <line x1="1090" y1="215" x2="320" y2="215" stroke="#ea580c" stroke-width="2" marker-end="url(#o)"/><rect x="570" y="200" width="270" height="21" fill="#fff"/><text x="705" y="215" text-anchor="middle">发布 LightningStrike / FireStarted</text>
