    <rect x="770" y="395" width="175" height="62" rx="8" fill="#fff" stroke="#d1d5db"/><text x="857" y="421">Smart Object</text><text x="857" y="441" class="s" font-size="11">能力广告 / 槽位预约</text>
    <rect x="1000" y="395" width="125" height="62" rx="8" fill="#fff" stroke="#d1d5db"/><text x="1062" y="421">动作意图</text><text x="1062" y="441" class="s" font-size="11">Intent</text>
  </g>
  <g stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#ab)"><path d="M255 426H302"/><path d="M485 426H532"/><path d="M715 426H762"/><path d="M945 426H992"/></g>
  <rect x="35" y="520" width="1130" height="105" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-dasharray="6,4"/>
  <text x="55" y="543" fill="#c2410c" class="h" font-size="12">一致性与表现</text>
  <g font-size="15" text-anchor="middle" class="t">
    <rect x="145" y="560" width="240" height="45" rx="7" fill="#fff" stroke="#d1d5db"/><text x="265" y="588">仲裁：锁、优先级、租约</text>
    <rect x="480" y="560" width="240" height="45" rx="7" fill="#fff" stroke="#d1d5db"/><text x="600" y="588">提交：ECS Command Buffer</text>
    <rect x="815" y="560" width="240" height="45" rx="7" fill="#fff" stroke="#d1d5db"/><text x="935" y="588">表现：导航 / 动画 / IK</text>
  </g>
  <g stroke="#ea580c" stroke-width="2" fill="none" marker-end="url(#ao)"><path d="M385 582H472"/><path d="M720 582H807"/></g>
  <path d="M1062 457V505H265V552" fill="none" stroke="#ea580c" stroke-width="2" marker-end="url(#ao)"/>
  <path d="M600 605V650H167V465" fill="none" stroke="#16a34a" stroke-width="1.7" stroke-dasharray="5,3" marker-end="url(#ag)"/>
  <text x="394" y="670" text-anchor="middle" class="s" font-size="12">提交后的新世界状态进入下一轮感知</text>
  <g transform="translate(55 710)" font-size="12" class="s"><line x1="0" y1="0" x2="32" y2="0" stroke="#2563eb" stroke-width="2" marker-end="url(#ab)"/><text x="42" y="4">认知数据流</text><line x1="180" y1="0" x2="212" y2="0" stroke="#ea580c" stroke-width="2" marker-end="url(#ao)"/><text x="222" y="4">意图与提交</text><line x1="365" y1="0" x2="397" y2="0" stroke="#16a34a" stroke-dasharray="5,3" marker-end="url(#ag)"/><text x="407" y="4">状态反馈</text></g>
</svg>
