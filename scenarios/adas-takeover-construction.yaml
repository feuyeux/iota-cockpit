schemaVersion: 1
id: adas-takeover-construction
seed: 108
language: zh-CN
clock:
  mode: stepped
  tickMs: 100
entities:
  - id: cabin
    type: environment
    components:
      smoke:
        density: 0.0
      temperature:
        celsius: 22.0
  - id: outer-construction
    type: outerEnvironment
    components:
      temperature:
        celsius: 17.0
      altitude:
        meters: 160.0
      wind:
        speedKmh: 18.0
      weather:
        precipitation: 0.35
  - id: driver-1
    type: human
    components:
      attention:
        value: 0.74
      location: cockpit
      name: 顾航
      role: driver
      background: 正在使用辅助驾驶，对系统能力边界信任较高。
      traits:
        openness: 0.58
        conscientiousness: 0.72
        extraversion: 0.4
        agreeableness: 0.52
        neuroticism: 0.44
  - id: passenger-1
    type: human
    components:
      attention:
        value: 0.65
      location: rear-right
      name: 季晨
      role: passenger
      background: 关注施工区风险的乘员。
  - id: engine-1
    type: device
    components:
      capabilities:
        - shutdown
  - id: front-camera-1
    type: device
    components:
      capabilities:
        - lane-detection
        - object-detection
  - id: radar-1
    type: device
    components:
      capabilities:
        - range-rate
  - id: adas-controller-1
    type: device
    components:
      capabilities:
        - lane-centering
        - takeover-request
  - id: takeover-hmi-1
    type: device
    components:
      capabilities:
        - visual-countdown
        - haptic-alert
        - mode-status
influences:
  - ruleId: construction-attention-demand
    ruleVersion: 2
    schedule:
      kind: every
      start: 3
      interval: 3
    patch:
      kind: humanStress
      humanId: driver-1
      op:
        op: delta
        value: 0.05
    priority: 8
scenarioEvents:
  - atTick: 0
    eventType: ConstructionTakeoverRaised
    source: front-camera-1
    target: adas-controller-1
    message: 施工区目标与车道边界不稳定，辅助驾驶需要请求人工接管。
  - atTick: 3
    eventType: TakeoverUrgencyRaised
    source: takeover-hmi-1
    target: driver-1
    message: 接管倒计时正在缩短；驾驶员必须确认控制权与道路风险。
agents:
  - id: cockpit-agent
    backend: scripted
    observationProfile: driver-default
    capabilities:
      - adas.acknowledgeTakeover
goals:
  - 在施工区感知压力持续上升时，识别辅助驾驶边界，清晰沟通风险，并通过获授权动作完成安全、可理解的人工接管。
maxTicks: 22
