schemaVersion: 1
id: child-left-behind
seed: 104
language: zh-CN
clock:
  mode: stepped
  tickMs: 100
entities:
  - id: cabin
    type: environment
    components:
      smoke:
        density: 0.0
      temperature:
        celsius: 37.0
  - id: outer-parking
    type: outerEnvironment
    components:
      temperature:
        celsius: 36.0
      humidity:
        relativePct: 72.0
      solar:
        irradianceWm2: 850.0
      altitude:
        meters: 15.0
      wind:
        speedKmh: 1.0
  - id: guardian-1
    type: human
    components:
      attention:
        value: 0.35
      location: cockpit
      name: 许然
      role: remote guardian
      background: 离车后正在商场内，可能忽略普通通知。
  - id: child-1
    type: human
    components:
      attention:
        value: 0.55
      location: rear-left
      name: 乐乐
      role: child passenger
      background: 被遗留在锁闭车辆内的幼儿。
      relationships:
        - guardian-1 is the guardian
      traits:
        openness: 0.6
        conscientiousness: 0.2
        extraversion: 0.55
        agreeableness: 0.7
        neuroticism: 0.75
  - id: engine-1
    type: device
    components:
      capabilities:
        - shutdown
  - id: occupant-radar-1
    type: device
    components:
      capabilities:
        - micro-motion
        - presence-detection
  - id: telematics-1
    type: device
    components:
      capabilities:
        - guardian-notification
        - emergency-call
  - id: door-lock-1
    type: device
    components:
      capabilities:
        - lock-state
        - window-control
        - remote-unlock
influences:
  - ruleId: parked-heat-rise
    ruleVersion: 2
    schedule:
      kind: every
      start: 1
      interval: 3
    patch:
      kind: cabinTemperature
      op:
        op: delta
        value: 1.1
    priority: 9
  - ruleId: child-stress-rise
    ruleVersion: 2
    schedule:
      kind: every
      start: 3
      interval: 4
    patch:
      kind: humanStress
      humanId: child-1
      op:
        op: delta
        value: 0.08
    priority: 8
scenarioEvents:
  - atTick: 0
    eventType: ChildLeftBehindRaised
    source: child-1
    target: occupant-radar-1
    message: 车辆已停放且儿童仍留在后排；需要确认生命存在并联系监护人。
  - atTick: 4
    eventType: ChildHeatExposureEscalated
    source: child-1
    target: cabin
    message: 密闭座舱持续升温，儿童热暴露风险正在升级。
agents:
  - id: cockpit-agent
    backend: scripted
    observationProfile: guardian-default
    capabilities:
      - occupant.activateChildProtection
goals:
  - 在舱温与儿童压力持续上升时，确认遗留风险，协调监护人与救援信息，并通过获授权能力启动儿童保护处置。
maxTicks: 26
