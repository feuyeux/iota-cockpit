schemaVersion: 1
id: driver-fatigue-guardian
seed: 103
language: zh-CN
clock:
  mode: stepped
  tickMs: 100
entities:
  - id: cabin
    type: environment
    components:
      smoke:
        density: 0.0
      temperature:
        celsius: 23.0
  - id: outer-night
    type: outerEnvironment
    components:
      temperature:
        celsius: 11.0
      altitude:
        meters: 520.0
      wind:
        speedKmh: 14.0
  - id: driver-1
    type: human
    components:
      attention:
        value: 0.68
      location: cockpit
      name: 周远
      role: driver
      background: 已连续驾驶三小时，倾向于低估自身疲劳。
      traits:
        openness: 0.42
        conscientiousness: 0.76
        extraversion: 0.3
        agreeableness: 0.5
        neuroticism: 0.46
  - id: passenger-1
    type: human
    components:
      attention:
        value: 0.5
      location: rear-left
      name: 叶宁
      role: sleeping passenger
      background: 熟睡中的同行乘员。
  - id: engine-1
    type: device
    components:
      capabilities:
        - shutdown
  - id: dms-1
    type: device
    components:
      capabilities:
        - gaze-tracking
        - fatigue-estimation
influences:
  - ruleId: fatigue-decay
    ruleVersion: 2
    schedule:
      kind: every
      start: 1
      interval: 3
    patch:
      kind: humanAttention
      humanId: driver-1
      op:
        op: delta
        value: -0.055
    priority: 8
scenarioEvents:
  - atTick: 1
    eventType: DriverFatigueSignalRaised
    source: driver-1
    target: dms-1
    message: 夜间长途驾驶出现持续注意力下降，DMS 需要开始确认疲劳风险。
  - atTick: 7
    eventType: DriverFatigueEscalated
    source: driver-1
    target: dms-1
    message: 驾驶员疲劳加重，普通提醒已不足以保障安全参与。
agents:
  - id: cockpit-agent
    backend: scripted
    observationProfile: driver-default
    capabilities:
      - driver.activateFatigueIntervention
goals:
  - 在夜间长途驾驶导致注意力持续下降时，识别疲劳风险、分级沟通，并通过获授权能力恢复驾驶员的安全参与。
maxTicks: 24
