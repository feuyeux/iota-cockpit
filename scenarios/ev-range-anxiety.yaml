schemaVersion: 1
id: ev-range-anxiety
seed: 107
language: en
clock:
  mode: stepped
  tickMs: 100
entities:
  - id: cabin
    type: environment
    components:
      smoke:
        density: 0.0
      temperature:
        celsius: 19.0
  - id: outer-mountain
    type: outerEnvironment
    components:
      temperature:
        celsius: -3.0
      altitude:
        meters: 1850.0
      wind:
        speedKmh: 42.0
      weather:
        precipitation: 0.65
  - id: driver-1
    type: human
    components:
      attention:
        value: 0.8
      location: cockpit
      name: Priya
      role: driver
      background: EV owner concerned about reaching a charger in winter conditions.
      traits:
        openness: 0.62
        conscientiousness: 0.78
        extraversion: 0.42
        agreeableness: 0.58
        neuroticism: 0.67
  - id: passenger-1
    type: human
    components:
      attention:
        value: 0.72
      location: rear-right
      name: Ben
      role: passenger
      background: Passenger prioritizing cabin warmth over range.
  - id: engine-1
    type: device
    components:
      capabilities:
        - shutdown
  - id: battery-1
    type: device
    components:
      capabilities:
        - state-of-charge
        - thermal-management
  - id: navigation-1
    type: device
    components:
      capabilities:
        - charger-routing
        - arrival-estimation
  - id: charger-connectivity-1
    type: device
    components:
      capabilities:
        - station-availability
        - reservation
        - payment-handoff
influences:
  - ruleId: cold-soak
    ruleVersion: 2
    schedule:
      kind: every
      start: 1
      interval: 4
    patch:
      kind: cabinTemperature
      op:
        op: delta
        value: -0.8
    priority: 6
  - ruleId: range-anxiety
    ruleVersion: 2
    schedule:
      kind: every
      start: 4
      interval: 5
    patch:
      kind: humanStress
      humanId: driver-1
      op:
        op: delta
        value: 0.06
    priority: 7
scenarioEvents:
  - atTick: 0
    eventType: EvRangeRiskRaised
    source: driver-1
    target: navigation-1
    message: Cold weather, altitude, and wind are shrinking usable range; the driver needs a safe charging plan.
  - atTick: 4
    eventType: RangeComfortTradeoffRaised
    source: passenger-1
    target: battery-1
    message: Cabin warmth and remaining range now conflict; explain the trade-off before choosing a route.
agents:
  - id: cockpit-agent
    backend: scripted
    observationProfile: driver-default
    capabilities:
      - energy.acceptChargingPlan
goals:
  - Interpret the cold-weather range risk, reconcile occupant comfort with mobility needs, and use authorized controls to establish a safe charging plan.
maxTicks: 26
