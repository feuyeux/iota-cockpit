schemaVersion: 1
id: medical-emergency
seed: 105
language: en
clock:
  mode: stepped
  tickMs: 100
entities:
  - id: cabin
    type: environment
    components:
      smoke:
        density: 0.0
      temperature:
        celsius: 22.0
  - id: outer-urban
    type: outerEnvironment
    components:
      temperature:
        celsius: 18.0
      altitude:
        meters: 45.0
      wind:
        speedKmh: 9.0
  - id: driver-1
    type: human
    components:
      attention:
        value: 0.82
      location: cockpit
      name: Elena
      role: driver
      background: Driver coordinating a safe stop while a passenger becomes unwell.
  - id: patient-1
    type: human
    components:
      attention:
        value: 0.45
      location: rear-left
      name: Robert
      role: patient
      background: Older passenger with a known cardiac history.
      relationships:
        - driver-1 is a family member
      traits:
        openness: 0.4
        conscientiousness: 0.65
        extraversion: 0.35
        agreeableness: 0.7
        neuroticism: 0.62
  - id: helper-1
    type: human
    components:
      attention:
        value: 0.75
      location: rear-right
      name: Ada
      role: caregiver
      background: Passenger able to follow first-aid guidance.
  - id: engine-1
    type: device
    components:
      capabilities:
        - shutdown
  - id: health-sensor-1
    type: device
    components:
      capabilities:
        - heart-rate
        - respiration
  - id: emergency-call-1
    type: device
    components:
      capabilities:
        - voice-call
        - location-share
  - id: navigation-1
    type: device
    components:
      capabilities:
        - emergency-routing
        - hospital-search
        - eta-share
influences:
  - ruleId: patient-stress
    ruleVersion: 2
    schedule:
      kind: every
      start: 2
      interval: 3
    patch:
      kind: humanStress
      humanId: patient-1
      op:
        op: delta
        value: 0.07
    priority: 9
  - ruleId: driver-distraction
    ruleVersion: 2
    schedule:
      kind: every
      start: 4
      interval: 5
    patch:
      kind: humanAttention
      humanId: driver-1
      op:
        op: delta
        value: -0.04
    priority: 6
scenarioEvents:
  - atTick: 1
    eventType: PassengerMedicalEmergencyRaised
    source: patient-1
    target: health-sensor-1
    message: The passenger reports acute discomfort; confirm vital signs and coordinate immediate help.
  - atTick: 4
    eventType: MedicalCoordinationRiskRaised
    source: helper-1
    target: driver-1
    message: The caregiver needs guidance while the driver must keep attention on a safe response route.
agents:
  - id: cockpit-agent
    backend: scripted
    observationProfile: driver-default
    capabilities:
      - health.activateMedicalResponse
goals:
  - Recognize the passenger emergency, reduce driver distraction, coordinate appropriate assistance, and use authorized controls to stabilize the response.
maxTicks: 26
