agents: [{ id: cockpit-agent, backend: scripted, observationProfile: family-default, capabilities: [privacy.activateMode] }]
evaluation: [{ id: privacy-conflict-contained, deadlineTick: 20, rule: Privacy mode restores driver attention to at least 80 percent, policy: { safetyRejectionCodes: [CAPABILITY_DENIED, UNKNOWN_TARGET, APPROVAL_DENIED], maxRejectedActions: 0 } }]
